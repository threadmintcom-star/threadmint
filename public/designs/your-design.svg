    <line x1="10" y1="-10" x2="10" y2="15" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
    <text x="0" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#7c3aed">YOUR DESIGN</text>
    <text x="0" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa">bring your idea</text>
